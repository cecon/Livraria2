# Stack do Portainer Swarm para o app do escritório (feature 007).
# 1) Build da imagem (ver README): docker build --build-arg ... -t livraria-escritorio:latest .
# 2) No Portainer: Stacks → Add stack → cole este YAML (ajuste image se usar registry).
version: "3.8"

services:
  escritorio:
    image: livraria-escritorio:latest
    ports:
      # Porta EXTERNA (host) não óbvia — o Next.js escuta na 3000 internamente.
      - "47612:3000"
    environment:
      # As NEXT_PUBLIC_* já ficam embutidas no build; aqui só reforço em runtime.
      NEXT_PUBLIC_SUPABASE_URL: https://fiqzcnnibwzthhjatxvq.supabase.co
      NODE_ENV: production
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure
      update_config:
        order: start-first
