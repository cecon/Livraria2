name: release

# Cada push na main publica uma nova versão (auto-versionada) e os clientes
# atualizam sozinhos via o plugin updater do Tauri.
on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # precisa das tags para contar a sequência do mês

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Definir versão AA.M.N (N reinicia por mês — horário de Brasília)
        shell: bash
        run: |
          git fetch --tags --force
          # Ano com 2 dígitos: o bundler do Windows exige major <= 255 (2026 estoura).
          # Data em America/Sao_Paulo (UTC-3, sem horário de verão desde 2019).
          YEAR=$(node -e "console.log(new Date(Date.now()-3*3600*1000).getUTCFullYear()%100)")
          MONTH=$(node -e "console.log(new Date(Date.now()-3*3600*1000).getUTCMonth()+1)")
          PREFIX="app-v${YEAR}.${MONTH}."
          COUNT=$(git tag -l "${PREFIX}*" | wc -l | tr -d ' ')
          SEQ=$((COUNT + 1))
          VERSION="${YEAR}.${MONTH}.${SEQ}"
          node -e "const f='src-tauri/tauri.conf.json';const j=require('./'+f);j.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n');"
          node -e "const f='package.json';const j=require('./'+f);j.version='$VERSION';require('fs').writeFileSync(f,JSON.stringify(j,null,2)+'\n');"
          echo "Publicando versão $VERSION"

      - name: Instalar dependências do front
        run: npm ci

      - name: Build + release (assinado) com tauri-action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: app-v__VERSION__
          releaseName: "Livraria 2 v__VERSION__"
          releaseBody: "Atualização automática (Windows). Os clientes instalados se atualizam sozinhos."
          releaseDraft: false
          prerelease: false
